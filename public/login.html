<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Iniciar sesión | SaludConecta+</title>
  <link rel="stylesheet" href="/css/styles.css">
</head>
<body class="auth-page">

  <nav class="navbar">
    <a href="/" class="navbar-brand">
      <span class="brand-icon">🏥</span>
      Salud<span><span>Conecta</span>+</span>
    </a>
    <div class="navbar-actions">
      <a href="/register.html" class="btn btn-primary btn-sm">Registrarse</a>
    </div>
  </nav>

  <div class="auth-container">
    <div class="auth-card">
      <div class="auth-header">
        <span class="auth-icon">👤</span>
        <h1>Bienvenido de vuelta</h1>
        <p>Ingresa a tu cuenta de SaludConecta+</p>
      </div>

      <div class="alert alert-error" id="alertError">
        <span>⚠️</span> <span id="errorMsg"></span>
      </div>

      <div class="form-group">
        <label class="form-label">Correo electrónico</label>
        <input type="email" id="email" class="form-input" placeholder="correo@ejemplo.com" autocomplete="email">
      </div>
      <div class="form-group">
        <label class="form-label">Contraseña</label>
        <input type="password" id="password" class="form-input" placeholder="Tu contraseña" autocomplete="current-password">
      </div>

      <button class="btn btn-primary" style="width:100%;justify-content:center;padding:.8rem;" id="btnLogin" onclick="handleLogin()">
        🔑 Iniciar sesión
      </button>

      <div class="form-divider">o</div>

      <div class="auth-footer">
        ¿No tienes cuenta? <a href="/register.html">Regístrate gratis</a>
      </div>
    </div>
  </div>

  <div class="toast-container" id="toastContainer"></div>
  <script src="/js/auth.js"></script>
</body>
</html>

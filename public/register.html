<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Registro | SaludConecta+</title>
  <link rel="stylesheet" href="/css/styles.css">
</head>
<body class="auth-page">

  <nav class="navbar">
    <a href="/" class="navbar-brand">
      <span class="brand-icon">🏥</span>
      Salud<span><span>Conecta</span>+</span>
    </a>
    <div class="navbar-actions">
      <a href="/login.html" class="btn btn-ghost btn-sm">¿Ya tienes cuenta? Ingresa</a>
    </div>
  </nav>

  <div class="auth-container">
    <div class="auth-card">
      <div class="auth-header">
        <span class="auth-icon">🏥</span>
        <h1>Crear cuenta</h1>
        <p>Únete a SaludConecta+ y cuida tu salud</p>
      </div>

      <div class="alert alert-error" id="alertError">
        <span>⚠️</span> <span id="errorMsg"></span>
      </div>
      <div class="alert alert-success" id="alertSuccess">
        <span>✅</span> <span id="successMsg"></span>
      </div>

      <div class="form-group">
        <label class="form-label">Nombre completo</label>
        <input type="text" id="nombre" class="form-input" placeholder="Ej. María García López" autocomplete="name">
      </div>
      <div class="form-group">
        <label class="form-label">Correo electrónico</label>
        <input type="email" id="email" class="form-input" placeholder="correo@ejemplo.com" autocomplete="email">
      </div>
      <div class="form-group">
        <label class="form-label">Contraseña</label>
        <input type="password" id="password" class="form-input" placeholder="Mínimo 6 caracteres" autocomplete="new-password">
      </div>
      <div class="form-group">
        <label class="form-label">Confirmar contraseña</label>
        <input type="password" id="password2" class="form-input" placeholder="Repite tu contraseña" autocomplete="new-password">
      </div>

      <button class="btn btn-primary" style="width:100%;justify-content:center;padding:.8rem;" id="btnRegister" onclick="handleRegister()">
        🚀 Crear mi cuenta
      </button>

      <div class="auth-footer">
        ¿Ya tienes cuenta? <a href="/login.html">Inicia sesión aquí</a>
      </div>
    </div>
  </div>

  <div class="toast-container" id="toastContainer"></div>
  <script src="/js/auth.js"></script>
</body>
</html>
